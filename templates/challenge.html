<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../static/css/style.css">
    <script src="/static/js/script.js" defer></script>
    <title>QCM</title>
</head>

<body>
    <aside class="sidebar">
        <div class="sidebar-actions">
            <button class="btn"><p>Recherche</p></button>
            <button class="btn"><p>Nouveau chat</p></button>
            <a class="link" href="{{ url_for('qcm') }}">Nouveau Quiz</a>
            <a class="link" href="{{ url_for('challenge') }}">Nouveau Challenge</a>
        </div>

        <div class="sidebar-history">
            <div class="section">
                <p class="section-title">Chat récent</p>
                <button class="btn-small">Durée de la pin</button>
            </div>

            <div class="section">
                <p class="section-title">Challenge récent</p>
                <button class="btn-small">Durée de la pin</button>
            </div>

            <div class="section">
                <p class="section-title">Quiz récent</p>
                <button class="btn-small">Durée de la pin</button>
            </div>
        </div>
    </aside>

    <main>
        <h1>Questionnaire Développement Web</h1>
        <form class="questionnaire">
            <!-- Question 1 -->
            <p>1. Quel langage est utilisé pour structurer une page web ?</p>
            <br>
            <div>
                <input type="radio" id="html" name="q1">
                <label for="html">HTML</label>
            </div>
            <br>
            <div>
                <input type="radio" id="python" name="q1">
                <label for="python">Python</label>                
            </div>
            <br>
            <div>
                <input type="radio" id="java" name="q1">
                <label for="java">Java</label>               
            </div>
            <br>
            <button type="submit">Envoyer</button>            
        
        
        </form>    
</body>
</html>
