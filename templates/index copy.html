<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../static/css/style.css">
    <script src="/static/js/script.js" defer></script>
    <title>Assistant IoT</title>
</head>

<body>
    <aside class="sidebar">
        <div class="sidebar-actions">
            <button class="btn"><p>Recherche</p></button>
            <button class="btn"><p>Nouveau chat</p></button>
            <a class="link" href="{{ url_for('qcm') }}">Nouveau Quiz</a>
            <a class="link" href="{{ url_for('challenge') }}">Nouveau Challenge</a>
        </div>

        <div class="sidebar-history">
            <div class="section">
                <p class="section-title">Chat récent</p>
                <button class="btn-small">Durée de la pin</button>
            </div>

            <div class="section">
                <p class="section-title">Challenge récent</p>
                <button class="btn-small">Durée de la pin</button>
            </div>

            <div class="section">
                <p class="section-title">Quiz récent</p>
                <button class="btn-small">Durée de la pin</button>
            </div>
        </div>
    </aside>

    
    <main>
        <p class="subtitle">
            Posez vos questions, relevez des défis, testez vos connaissances : votre coach IoT est là
        </p>

        <div class="fonctionnalité">
            <a href="{{ url_for('qcm') }}">Création d’un quiz de 5 questions</a>
            <a href="{{ url_for('challenge') }}">Challenger vous selon les thèmes de l’IOT</a>
        </div>

        <textarea placeholder="Poser une question..."></textarea>
    </main>
</body>
</html>
