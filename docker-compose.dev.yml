services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: assistant_pedago_dev
    ports:
      - "5001:5000"
    volumes:
      - .:/app
      - /app/myvenv
    # --- AJOUTE CETTE LIGNE ICI ---
    env_file:
      - .env
    # ------------------------------
    environment:
      - FLASK_ENV=development
      - PYTHONUNBUFFERED=1
    command: python app.py