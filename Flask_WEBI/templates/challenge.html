{% extends "layout/base.html" %}

{% block title %}Challenge Ouvert{% endblock %}

{% block content %}
<h1>Challenge Question Ouverte</h1>
<div class="questionnaire-container">
    <p class="subtitle">Testez vos connaissances en rédigeant votre propre réponse.</p>
    
    <div class="challenge-box" style="background-color: var(--color-bg-secondary); padding: 15px; border-radius: 8px; margin-bottom: 20px;">
        <p><strong>Question générée :</strong> {{ question }}</p>
    </div>

    <form class="question_poser" action="{{ url_for('challenge') }}" method="POST">
        <input type="hidden" name="question" value="{{ question }}">
        
        <textarea name="user_answer" placeholder="Rédigez votre réponse détaillée ici..." required style="width: 100%; min-height: 120px; margin-bottom: 15px;"></textarea>
        <button type="submit">Soumettre pour correction</button>
    </form>
</div>
{% endblock %}
