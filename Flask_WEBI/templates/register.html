<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../static/css/style.css">
    <script src="/static/js/script.js" defer></script>
    <title>Document</title>
</head>
<body>
  <div class="interface_de_connexion">
    <h2>Créer un compte</h2>
          {% with messages = get_flashed_messages() %}
            {% if messages %}
              <ul style="color: red;">
              {% for message in messages %}
                <li>{{ message }}</li>
              {% endfor %}
              </ul>
            {% endif %}
          {% endwith %}
      
          <form method="POST">
              <div>
                  <label for="email">Email :</label>
                  <input type="email" id="email" name="email" placeholder="votre@email.com" required>
              </div>
              <br>
              <div>
                  <label for="password">Mot de passe :</label>
                  <input type="password" id="password" name="password" placeholder="Choisissez un mot de passe" required>
              </div>
              <br>
              <button type="submit">S'inscrire</button>
          </form>
      
          <p>Déjà un compte ? <a href="{{ url_for('login') }}">Connectez-vous ici</a></p>
          <p><a href="{{ url_for('home') }}">Retour à l'accueil</a></p>
    </div>
    <div class="font_connexion">
    </div>
</body>
</html>
